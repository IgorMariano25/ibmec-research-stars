# ============================================================
# PRODUÇÃO
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# - backend: jar empacotado rodando em JRE enxuta
# - frontend: build estático servido por nginx (proxy /api -> backend)
# ============================================================
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irs-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Banco H2 em arquivo, persistido no volume nomeado
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/researchstars;AUTO_SERVER=TRUE
    volumes:
      - irs-data:/app/data
    networks:
      - irs-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: irs-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - irs-net

networks:
  irs-net:
    driver: bridge

volumes:
  irs-data:
